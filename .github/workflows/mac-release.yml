name: macOS Release

# Triggers:
#   push to main or release branch → build + sign + notarize + publish
#     (publishes to the release matching the version in mix.exs, clobbering
#      any existing DMG asset so the Windows .exe is never disturbed)
#   push of a v* tag → same, but also creates the release if it doesn't exist
#   workflow_dispatch → manual run for testing
on:
  push:
    branches:
      - main
      - release
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # create releases + upload assets

env:
  OTP_VERSION: "27.3.4"
  ELIXIR_VERSION: "1.18.4"

jobs:
  build-sign-notarize:
    runs-on: macos-latest   # Apple Silicon (arm64)

    steps:
      - uses: actions/checkout@v4

      # ── Language toolchain ──────────────────────────────────────────────────
      # Matches .tool-versions (erlang 27.3.4.12 / elixir 1.18.4-otp-27).
      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      # ── Mix dependency cache ─────────────────────────────────────────────────
      # build_release.sh runs `mix deps.get --only prod` itself, but a warm
      # deps/ and _build/prod tree cuts several minutes off each run.
      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/prod
          key: ${{ runner.os }}-${{ runner.arch }}-mix-prod-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-mix-prod-

      # ── OpenSSL (Homebrew pre-installed on macos-latest) ───────────────────
      # build_release.sh uses vtool to patch Homebrew's libcrypto minos to 11.0
      # in-place, so no source build or cache is needed here. Just make sure
      # openssl@3 is present (it is on all GitHub Actions macOS runners).
      - name: Ensure openssl@3 is installed
        run: brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3

      # ── Import Developer ID signing certificate ─────────────────────────────
      # Decodes the base64-encoded .p12 export, imports it into a temporary
      # keychain scoped to this runner, then grants codesign access to it.
      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_B64" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/certificate.p12

      # ── Ensure Finder is running for DMG window layout ─────────────────────
      # build_release.sh uses osascript/Finder to set the DMG icon layout.
      - name: Start Finder
        run: open -a Finder || true

      # ── Build, sign, notarize, staple ───────────────────────────────────────
      # build_release.sh handles the full pipeline:
      #   Mix release → assemble .app → sign all Mach-O (beam.smp with allow-jit)
      #   → notarize+staple .app → create DMG → sign+notarize+staple DMG
      # Credentials are passed as env vars and never written to disk or committed.
      - name: Build signed + notarized DMG
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: ./scripts/build_release.sh

      # ── Gatekeeper + stapler verification ──────────────────────────────────
      - name: Verify Gatekeeper acceptance
        run: |
          spctl -a -vvv -t open \
            --context context:primary-signature \
            release/StockPlanCompanion-arm64.dmg
          xcrun stapler validate release/StockPlanCompanion-arm64.dmg

      # ── Upload DMG as workflow artifact (always) ────────────────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockPlanCompanion-macOS-arm64
          path: release/StockPlanCompanion-arm64.dmg
          retention-days: 7

      # ── Publish to GitHub Release ───────────────────────────────────────────
      # For branch pushes (main / release): derive tag from mix.exs version and
      # clobber the DMG on that release. The Windows exe is never touched.
      # For tag pushes (v*): create the release if it doesn't exist, then upload.
      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            VERSION=$(sed -nE 's/^[[:space:]]*version:[[:space:]]*"([^"]+)".*/\1/p' mix.exs | head -1)
            TAG="v${VERSION}"
          fi

          echo "Publishing DMG to release $TAG"

          if gh release view "$TAG" \
               --repo Arthium-Org/stock-plan-companion-app \
               >/dev/null 2>&1; then
            echo "Release exists — uploading/overwriting DMG asset"
            gh release upload "$TAG" release/StockPlanCompanion-arm64.dmg \
              --repo Arthium-Org/stock-plan-companion-app \
              --clobber
          else
            echo "Creating new release $TAG"
            gh release create "$TAG" release/StockPlanCompanion-arm64.dmg \
              --repo Arthium-Org/stock-plan-companion-app \
              --title "$TAG" \
              --generate-notes
          fi

      # ── Verify published release ────────────────────────────────────────────
      - name: Verify published release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            VERSION=$(sed -nE 's/^[[:space:]]*version:[[:space:]]*"([^"]+)".*/\1/p' mix.exs | head -1)
            TAG="v${VERSION}"
          fi
          LOCAL_SHA=$(shasum -a 256 release/StockPlanCompanion-arm64.dmg | awk '{print $1}')
          echo "Local DMG SHA256: $LOCAL_SHA"
          gh release view "$TAG" \
            --repo Arthium-Org/stock-plan-companion-app \
            --json tagName,assets \
            --jq '{tag: .tagName, assets: [.assets[] | {name, size}]}'

      # ── Cleanup keychain ────────────────────────────────────────────────────
      - name: Delete build keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true
